<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love AWS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --aws-orange: #FF9900;
      --aws-dark: #232F3E;
      --aws-blue: #1A73E8;
      --aws-sky: #A8D8EA;
      --cloud-white: #F8FBFF;
      --glow: rgba(255, 153, 0, 0.6);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--aws-dark);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated sky background */
    .sky {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #0a1628 0%, #1a2a4a 40%, #232F3E 100%);
      z-index: 0;
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 1;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(0.8); }
      to   { opacity: 0.9; transform: scale(1.2); }
    }

    /* Floating clouds */
    .clouds {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .cloud {
      position: absolute;
      background: rgba(168, 216, 234, 0.08);
      border-radius: 50%;
      filter: blur(18px);
      animation: drift linear infinite;
    }
    @keyframes drift {
      from { transform: translateX(-200px); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      to   { transform: translateX(calc(100vw + 200px)); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 80px 100px;
      max-width: 800px;
      animation: cardIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(60px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* AWS Logo mark */
    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 90px;
      height: 90px;
      background: var(--aws-orange);
      border-radius: 18px;
      margin-bottom: 48px;
      box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(255,153,0,0.25);
      animation: cardIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) both, pulse 3s ease-in-out infinite;
      position: relative;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px var(--glow), 0 0 80px rgba(255,153,0,0.25); }
      50%       { box-shadow: 0 0 60px var(--glow), 0 0 120px rgba(255,153,0,0.4); }
    }
    .logo-mark svg {
      width: 56px;
      height: 56px;
    }

    /* Main headline */
    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 14vw, 140px);
      line-height: 0.9;
      letter-spacing: 2px;
      color: var(--cloud-white);
      animation: cardIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
    }
    .headline .love {
      display: block;
      color: var(--aws-orange);
      text-shadow: 0 0 30px var(--glow);
      animation: heartbeat 1.8s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.04); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.02); }
      70%       { transform: scale(1); }
    }
    .headline .aws-text {
      display: block;
      -webkit-text-stroke: 2px var(--aws-orange);
      color: transparent;
    }

    /* Subtitle */
    .subtitle {
      margin-top: 32px;
      font-size: 13px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: rgba(168, 216, 234, 0.7);
      animation: cardIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both;
    }

    /* Service pills */
    .services {
      margin-top: 52px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      animation: cardIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
    }
    .pill {
      background: rgba(255,153,0,0.08);
      border: 1px solid rgba(255,153,0,0.25);
      color: var(--aws-orange);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 6px 16px;
      border-radius: 100px;
      transition: all 0.25s ease;
      cursor: default;
    }
    .pill:hover {
      background: rgba(255,153,0,0.18);
      border-color: var(--aws-orange);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(255,153,0,0.2);
    }

    /* Uptime badge */
    .uptime {
      margin-top: 56px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(168,216,234,0.45);
      text-transform: uppercase;
      animation: cardIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.55s both;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* Bottom horizontal rule */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--aws-orange), transparent);
      margin: 32px auto 0;
    }
  </style>
</head>
<body>

  <div class="sky"></div>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Clouds -->
  <div class="clouds" id="clouds"></div>

  <!-- Main content -->
  <div class="card">
    <div class="logo-mark">
      <!-- AWS Cloud icon (SVG) -->
      <svg viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 42C9.37 42 4 36.63 4 30C4 23.37 9.37 18 16 18C16.34 18 16.68 18.01 17.01 18.04C18.84 12.24 24.24 8 30.67 8C35.63 8 40.03 10.37 42.88 14.05C44.16 13.37 45.62 13 47.17 13C52.03 13 56.04 16.87 56.33 21.73C56.88 21.58 57.46 21.5 58.07 21.5C63.53 21.5 68 25.97 68 31.43C68 36.89 63.53 41.36 58.07 41.36L16 42Z" fill="white" fill-opacity="0.95"/>
        <path d="M20 56L16 48H64L60 56" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M40 48V56" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="headline">
      <span>I</span>
      <span class="love">♥</span>
      <span class="aws-text">AWS</span>
    </h1>

    <p class="subtitle">Amazon Web Services · Infinitely Scalable</p>

    <div class="services">
      <span class="pill">EC2</span>
      <span class="pill">S3</span>
      <span class="pill">Lambda</span>
      <span class="pill">RDS</span>
      <span class="pill">CloudFront</span>
      <span class="pill">ECS</span>
      <span class="pill">IAM</span>
      <span class="pill">Route 53</span>
      <span class="pill">DynamoDB</span>
      <span class="pill">SQS</span>
      <span class="pill">SNS</span>
      <span class="pill">Bedrock</span>
    </div>

    <div class="uptime">
      <span class="dot"></span>
      All systems operational
    </div>

    <div class="divider"></div>
  </div>

  <script>
    // Generate stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --dur:${(Math.random()*3+1.5).toFixed(1)}s;
        animation-delay:${(Math.random()*4).toFixed(1)}s;
      `;
      starsEl.appendChild(s);
    }

    // Generate clouds
    const cloudsEl = document.getElementById('clouds');
    const cloudDefs = [
      { w:320, h:160, top:'12%', dur:'55s', delay:'0s'  },
      { w:220, h:110, top:'28%', dur:'70s', delay:'12s' },
      { w:400, h:180, top:'55%', dur:'48s', delay:'5s'  },
      { w:180, h: 90, top:'70%', dur:'62s', delay:'25s' },
      { w:280, h:130, top:'8%',  dur:'80s', delay:'35s' },
    ];
    cloudDefs.forEach(c => {
      const el = document.createElement('div');
      el.className = 'cloud';
      el.style.cssText = `
        width:${c.w}px; height:${c.h}px;
        top:${c.top}; left:0;
        animation-duration:${c.dur};
        animation-delay:${c.delay};
      `;
      cloudsEl.appendChild(el);
    });
  </script>
</body>
</html>
